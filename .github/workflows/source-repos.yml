name: Nightly repo sourcing

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  source-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure database schema is current
        run: python3 scripts/ensure_schema.py

      - name: Run repo sourcing
        env:
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/source_repos.py

      - name: Commit and push if data changed
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "actions@github.com"
          git add data/ai_digest.db
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "nightly repo sourcing: $(date -u +'%Y-%m-%d')"
            git push
          fi
